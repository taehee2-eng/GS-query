<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌전략팀 SQL 가이드 📊</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3348;
    --accent: #6c8ef7;
    --accent2: #a78bfa;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --text: #e2e8f0;
    --text-muted: #b0bcc8;
    --code-bg: #13162a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    display:flex; height:100vh; overflow:hidden;
  }

  /* SIDEBAR */
  #sidebar {
    width:260px; min-width:260px; background: var(--surface);
    border-right: 1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;
  }
  #sidebar-header {
    padding:20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 { font-size:15px; color:var(--text); font-weight:700; }
  #sidebar-header p { font-size:11px; color:var(--text-muted); margin-top:4px; }
  #search-box {
    margin:12px 12px 0;
    background: var(--code-bg); border:1px solid var(--border);
    border-radius:8px; padding:8px 10px;
    color:var(--text); font-size:13px; width:calc(100% - 24px);
    outline:none;
  }
  #search-box:focus { border-color:var(--accent); }
  #search-box::placeholder { color:var(--text-muted); }
  #nav { flex:1; overflow-y:auto; padding:8px 0 20px; }
  #nav::-webkit-scrollbar { width:4px; }
  #nav::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .nav-section { margin-bottom:4px; }
  .nav-section-title {
    font-size:10px; font-weight:700; letter-spacing:.08em;
    color:var(--text-muted); text-transform:uppercase;
    padding:8px 16px 4px;
  }
  .nav-item {
    display:block; padding:7px 16px; cursor:pointer;
    font-size:13px; color:var(--text-muted);
    border-left:2px solid transparent;
    transition:all .15s;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active {
    color:var(--accent); border-left-color:var(--accent);
    background:rgba(108,142,247,.08);
  }
  .nav-tag {
    display:inline-block; font-size:9px; padding:1px 5px;
    border-radius:4px; margin-left:6px; vertical-align:middle;
  }
  .tag-basic { background:rgba(52,211,153,.15); color:var(--green); }
  .tag-mid { background:rgba(251,191,36,.15); color:var(--yellow); }
  .tag-adv { background:rgba(167,139,250,.15); color:var(--accent2); }

  /* MAIN */
  #main {
    flex:1; display:flex; flex-direction:column; overflow:hidden;
  }
  #topbar {
    padding:16px 28px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
    background:var(--surface);
  }
  #topbar h2 { font-size:17px; font-weight:700; }
  #topbar .badge {
    font-size:11px; padding:2px 8px; border-radius:20px;
    background:rgba(108,142,247,.15); color:var(--accent);
  }
  #content { flex:1; overflow-y:auto; padding:24px 28px; }
  #content::-webkit-scrollbar { width:6px; }
  #content::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* TEACHER PANEL */
  #teacher-toggle {
    position:fixed; right:20px; bottom:20px;
    width:52px; height:52px; border-radius:50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border:none; cursor:pointer; color:#fff; font-size:22px;
    box-shadow:0 4px 20px rgba(108,142,247,.4);
    transition:transform .2s; z-index:100;
  }
  #teacher-toggle:hover { transform:scale(1.08); }
  #teacher-panel {
    position:fixed; right:20px; bottom:84px;
    width:360px; background:var(--surface);
    border:1px solid var(--border); border-radius:16px;
    box-shadow:0 8px 40px rgba(0,0,0,.5);
    display:none; flex-direction:column;
    max-height:500px; z-index:100;
    overflow:hidden;
  }
  #teacher-panel.open { display:flex; }
  #teacher-header {
    padding:14px 16px; background:linear-gradient(135deg, rgba(108,142,247,.2), rgba(167,139,250,.15));
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  #teacher-header .avatar {
    width:32px; height:32px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:16px;
  }
  #teacher-header h3 { font-size:14px; font-weight:700; }
  #teacher-header p { font-size:11px; color:var(--text-muted); }
  #chat-area {
    flex:1; overflow-y:auto; padding:14px;
    display:flex; flex-direction:column; gap:10px;
  }
  #chat-area::-webkit-scrollbar { width:4px; }
  #chat-area::-webkit-scrollbar-thumb { background:var(--border); }
  .chat-msg {
    padding:9px 12px; border-radius:12px; font-size:13px; line-height:1.5;
    max-width:90%;
  }
  .chat-msg.bot {
    background:var(--surface2); color:var(--text);
    border-radius:4px 12px 12px 12px;
  }
  .chat-msg.user {
    background:rgba(108,142,247,.2); color:var(--text);
    align-self:flex-end;
    border-radius:12px 12px 4px 12px;
  }
  .chat-msg code {
    background:var(--code-bg); padding:1px 5px; border-radius:4px;
    font-family:monospace; font-size:12px; color:var(--green);
  }
  #quick-btns {
    padding:10px 14px; display:flex; flex-wrap:wrap; gap:6px;
    border-top:1px solid var(--border);
  }
  .quick-btn {
    font-size:11px; padding:5px 10px; border-radius:20px;
    border:1px solid var(--border); background:transparent;
    color:var(--text-muted); cursor:pointer; transition:all .15s;
  }
  .quick-btn:hover { border-color:var(--accent); color:var(--accent); }
  #chat-input-row {
    padding:10px 14px; border-top:1px solid var(--border);
    display:flex; gap:8px;
  }
  #chat-input {
    flex:1; background:var(--code-bg); border:1px solid var(--border);
    border-radius:8px; padding:8px 10px; color:var(--text);
    font-size:13px; outline:none;
  }
  #chat-input:focus { border-color:var(--accent); }
  #chat-send {
    background:var(--accent); border:none; border-radius:8px;
    padding:8px 14px; color:#fff; cursor:pointer; font-size:13px;
    transition:opacity .15s;
  }
  #chat-send:hover { opacity:.85; }

  /* QUERY CARD */
  .query-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; margin-bottom:16px; overflow:hidden;
    transition:border-color .15s;
  }
  .query-card:hover { border-color:var(--accent); }
  .query-card.hidden { display:none; }
  .card-header {
    padding:14px 16px; cursor:pointer;
    display:flex; align-items:flex-start; gap:10px;
  }
  .card-num {
    min-width:28px; height:28px; border-radius:8px;
    background:rgba(108,142,247,.15); color:var(--accent);
    font-size:12px; font-weight:700; display:flex;
    align-items:center; justify-content:center;
  }
  .card-title-wrap { flex:1; }
  .card-title { font-size:14px; font-weight:600; line-height:1.3; }
  .card-desc { font-size:12px; color:var(--text-muted); margin-top:3px; }
  .card-tags { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
  .card-tag {
    font-size:10px; padding:2px 7px; border-radius:10px;
    background:var(--surface2); color:var(--text-muted);
  }
  .card-tag.table { background:rgba(52,211,153,.1); color:var(--green); }
  .card-tag.func { background:rgba(251,191,36,.1); color:var(--yellow); }
  .card-toggle { color:var(--text-muted); font-size:14px; transition:transform .2s; }
  .card-toggle.open { transform:rotate(180deg); }
  .card-body { border-top:1px solid var(--border); display:none; }
  .card-body.open { display:block; }
  .card-section { padding:12px 16px; border-bottom:1px solid var(--border); }
  .card-section:last-child { border-bottom:none; }
  .section-label {
    font-size:10px; font-weight:700; text-transform:uppercase;
    color:var(--text-muted); letter-spacing:.06em; margin-bottom:8px;
  }
  .hint-box {
    background:rgba(108,142,247,.08); border:1px solid rgba(108,142,247,.2);
    border-radius:8px; padding:10px 12px; font-size:12px;
    color:var(--text); line-height:1.6;
  }
  .hint-box.warn {
    background:rgba(251,191,36,.06); border-color:rgba(251,191,36,.2);
    color:#e2c96a;
  }
  .hint-box.success {
    background:rgba(52,211,153,.06); border-color:rgba(52,211,153,.2);
    color:#6ee7b7;
  }
  .hint-icon { margin-right:5px; }
  .code-wrap { position:relative; }
  pre {
    background:var(--code-bg); border-radius:8px;
    padding:14px; overflow-x:auto; font-size:12.5px;
    line-height:1.7; border:1px solid var(--border);
  }
  pre::-webkit-scrollbar { height:4px; }
  pre::-webkit-scrollbar-thumb { background:var(--border); }
  .copy-btn {
    position:absolute; top:8px; right:8px;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:6px; padding:4px 10px; color:var(--text-muted);
    cursor:pointer; font-size:11px; transition:all .15s;
  }
  .copy-btn:hover { border-color:var(--accent); color:var(--accent); }
  .copy-btn.copied { border-color:var(--green); color:var(--green); }

  /* QUIZ */
  .quiz-section-header {
    display:flex; align-items:center; gap:10px;
    padding:24px 0 12px; border-top:1px solid var(--border); margin-top:8px;
  }
  .quiz-section-header h3 { font-size:16px; font-weight:700; }
  .quiz-section-header p { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .quiz-badge {
    font-size:10px; padding:2px 8px; border-radius:10px;
    background:rgba(251,191,36,.15); color:var(--yellow);
  }
  .quiz-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; margin-bottom:12px; overflow:hidden;
    border-left:3px solid var(--yellow);
  }
  .quiz-card:hover { border-color:var(--yellow); }
  .quiz-header {
    padding:14px 16px; cursor:pointer;
    display:flex; align-items:flex-start; gap:10px;
  }
  .quiz-num {
    min-width:28px; height:28px; border-radius:8px;
    background:rgba(251,191,36,.15); color:var(--yellow);
    font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .quiz-level {
    font-size:10px; padding:2px 7px; border-radius:10px;
    margin-left:6px; vertical-align:middle;
  }
  .level-기초 { background:rgba(52,211,153,.1); color:var(--green); }
  .level-중급 { background:rgba(251,191,36,.1); color:var(--yellow); }
  .level-고급 { background:rgba(167,139,250,.1); color:var(--accent2); }
  .quiz-body { border-top:1px solid var(--border); display:none; }
  .quiz-body.open { display:block; }
  .quiz-hints { padding:12px 16px; border-bottom:1px solid var(--border); }
  .hint-list { list-style:none; margin-top:6px; display:flex; flex-wrap:wrap; gap:6px; }
  .hint-list li {
    background:var(--code-bg); border:1px solid var(--border);
    border-radius:6px; padding:3px 9px; font-size:11px;
    color:var(--text-muted); font-family:monospace;
  }
  .quiz-answer { display:none; }
  .quiz-answer.open { display:block; }
  .answer-toggle {
    margin:12px 16px; padding:8px 14px; border-radius:8px;
    border:1px solid var(--border); background:transparent;
    color:var(--text-muted); cursor:pointer; font-size:12px;
    width:calc(100% - 32px); text-align:left; transition:all .15s;
  }
  .answer-toggle:hover { border-color:var(--accent); color:var(--accent); }
  .answer-toggle.revealed { border-color:var(--green); color:var(--green); }
  .quiz-answer .card-section { padding:0 16px 14px; }

  /* Syntax highlight */
  .kw { color:#81a1f7; font-weight:600; }
  .fn { color:#fbbf24; }
  .str { color:#f97316; }
  .cm { color:#4a5568; font-style:italic; }
  .tbl { color:#34d399; }
  .num { color:#a78bfa; }
  .op { color:#94a3b8; }

  /* CHAPTER HEADER */
  .chapter-header {
    padding:20px 0 12px;
    display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--border); margin-bottom:20px;
  }
  .chapter-icon {
    width:40px; height:40px; border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .chapter-header h2 { font-size:20px; font-weight:700; }
  .chapter-header p { font-size:13px; color:var(--text-muted); margin-top:2px; }

  /* TABLE INFO */
  .table-info-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:10px; margin-bottom:8px;
  }
  .table-info-card {
    background:var(--code-bg); border:1px solid var(--border);
    border-radius:8px; padding:10px 12px;
  }
  .table-info-card .tname { font-size:12px; font-weight:700; color:var(--green); font-family:monospace; }
  .table-info-card .tdesc { font-size:11px; color:var(--text-muted); margin-top:3px; }
  .table-info-card .tstars { color:var(--yellow); font-size:11px; margin-top:4px; }

  /* HOME */
  .home-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:12px; margin-bottom:24px;
  }
  .home-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:16px; cursor:pointer;
    transition:all .15s;
  }
  .home-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .home-card .hc-icon { font-size:24px; margin-bottom:8px; }
  .home-card .hc-title { font-size:14px; font-weight:700; margin-bottom:4px; }
  .home-card .hc-desc { font-size:12px; color:var(--text-muted); line-height:1.5; }
  .home-card .hc-count {
    margin-top:8px; font-size:11px; color:var(--accent);
  }
  .welcome-banner {
    background: linear-gradient(135deg, rgba(108,142,247,.2), rgba(167,139,250,.15));
    border:1px solid rgba(108,142,247,.3); border-radius:16px;
    padding:40px 32px; margin-bottom:32px; text-align:center;
  }
  .welcome-banner h1 { font-size:32px; font-weight:800; margin-bottom:12px; background:linear-gradient(135deg, #6c8ef7, #a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .welcome-banner p { font-size:16px; color:var(--text-muted); line-height:1.7; }

  /* SEARCH */
  .search-container {
    margin-bottom:32px;
  }
  .search-input-wrapper {
    position:relative; margin-bottom:20px;
  }
  .search-input-wrapper input {
    width:100%; padding:16px 20px; font-size:16px;
    background:var(--surface); border:2px solid var(--border);
    border-radius:12px; transition:all .2s;
    font-family:inherit; color:#b0bcc8;
  }
  .search-input-wrapper input:focus {
    outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(108,142,247,.1);
  }
  .search-input-wrapper::after {
    content:'🔍'; position:absolute; right:16px; top:50%;
    transform:translateY(-50%); color:var(--text-muted); pointer-events:none;
  }

  .recommended-section {
    margin-bottom:32px;
  }
  .recommended-section h3 {
    font-size:14px; font-weight:700; color:var(--text-muted);
    margin-bottom:12px; text-transform:uppercase; letter-spacing:.5px;
  }
  .recommended-questions {
    display:flex; flex-wrap:wrap; gap:8px;
  }
  .question-chip {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:8px 14px; font-size:13px;
    cursor:pointer; transition:all .15s; white-space:nowrap;
  }
  .question-chip:hover {
    border-color:var(--accent); background:rgba(108,142,247,.05);
    transform:translateY(-1px);
  }

  /* GLOSSARY */
  .glossary-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
    gap:10px;
  }
  .glossary-item {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px;
  }
  .glossary-item .gterm { font-size:13px; font-weight:700; color:var(--accent); font-family:monospace; }
  .glossary-item .gdef { font-size:12px; color:var(--text-muted); margin-top:4px; line-height:1.5; }
  .glossary-item .gex { font-size:11px; color:var(--green); margin-top:5px; font-family:monospace; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>📊 SQL 가이드</h1>
    <p>글로벌전략팀 · BigQuery</p>
  </div>
  <input id="search-box" type="text" placeholder="🔍 쿼리 검색..." oninput="handleSearch(this.value)">
  <nav id="nav">
    <div class="nav-section">
      <div class="nav-section-title">시작하기</div>
      <div class="nav-item active" onclick="showPage('home')">🏠 홈</div>
      <div class="nav-item" onclick="showPage('tables')">🗂️ 주요 테이블 정리</div>
      <div class="nav-item" onclick="showPage('glossary')">📖 SQL 용어 사전</div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">쿼리 챕터</div>
      <div class="nav-item" onclick="showPage('ch0')">Ch.0 · 기초 조회 <span class="nav-tag tag-basic">기초</span></div>
      <div class="nav-item" onclick="showPage('ch1')">Ch.1 · 집계 &amp; CASE WHEN <span class="nav-tag tag-basic">기초</span></div>
      <div class="nav-item" onclick="showPage('ch2')">Ch.2 · 서브쿼리 <span class="nav-tag tag-mid">중급</span></div>
      <div class="nav-item" onclick="showPage('ch3')">Ch.3 · JOIN &amp; UNION <span class="nav-tag tag-mid">중급</span></div>
      <div class="nav-item" onclick="showPage('ch4')">Ch.4 · CTE (WITH절) <span class="nav-tag tag-adv">고급</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">실무 쿼리</div>
      <div class="nav-item" onclick="showPage('ref')">⭐ 글전팀 주요 쿼리</div>
    </div>
  </nav>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <h2 id="page-title">홈</h2>
    <span id="page-badge" class="badge"></span>
  </div>
  <div id="content"></div>
</div>

<!-- TEACHER BUTTON -->
<button id="teacher-toggle" onclick="toggleTeacher()" title="SQL 선생님에게 물어보기">🤖</button>

<!-- TEACHER PANEL -->
<div id="teacher-panel">
  <div id="teacher-header">
    <div class="avatar">🤖</div>
    <div>
      <h3>SQL 선생님</h3>
      <p>무엇이든 물어보세요!</p>
    </div>
  </div>
  <div id="chat-area">
    <div class="chat-msg bot">
      안녕하세요! 저는 글전팀 SQL 가이드 선생님이에요 📚<br><br>
      아래 버튼을 눌러 자주 묻는 질문을 확인하거나, 직접 질문을 입력해보세요!
    </div>
  </div>
  <div id="quick-btns">
    <button class="quick-btn" onclick="quickAsk('partition_key')">파티션키가 뭔가요?</button>
    <button class="quick-btn" onclick="quickAsk('group_by')">GROUP BY 언제 써요?</button>
    <button class="quick-btn" onclick="quickAsk('join_diff')">LEFT JOIN vs INNER JOIN</button>
    <button class="quick-btn" onclick="quickAsk('with_cte')">WITH절 왜 써요?</button>
    <button class="quick-btn" onclick="quickAsk('net_amt')">순판매액은 어떻게 계산?</button>
    <button class="quick-btn" onclick="quickAsk('date_trunc')">DATE_TRUNC 사용법</button>
  </div>
  <div id="chat-input-row">
    <input id="chat-input" placeholder="질문 입력..." onkeydown="if(event.key==='Enter')sendChat()">
    <button id="chat-send" onclick="sendChat()">전송</button>
  </div>
</div>

<script>
// ===== DATA =====
const PAGES = {
  home: { title:'홈', badge:'' },
  tables: { title:'주요 테이블 정리', badge:'BigQuery' },
  glossary: { title:'SQL 용어 사전', badge:'참고자료' },

    {

      title:'피지컬 TOP30 아티스트 종합 지표 (매출/AU/Engage)',
      desc:'최근 12개월 피지컬 순매출 기준 TOP30 선정. 테스트 계정 제외 조건 포함',
      tables:['we_artist', 'stats_we_t_kpi', 'stats_we_t_kpi_metric', 'stats_wv_m_comm_engage_usr'],
      funcs:['WITH (CTE)', 'RANK() OVER', 'LIMIT', 'NOT IN', 'UNION ALL', 'DATE_ADD'],
      hint:'디지털 TOP30(실무7)과의 차이:\n① extra_key NOT IN (...) → 피지컬만 집계 (디지컬 제외)\n② NOT IN 제외 목록: -9999, 69, 36, 135, 3, 1706, 143\n   (smtown, jisoo, gfriend, 위버스존 등 테스트/특수 계정)\n\n💡 제외 목록은 주기적으로 검토가 필요해요!',
      hintType:'warn',
      code:`/* 피지컬 TOP30 아티스트 종합 지표 */
WITH rk AS (
  -- 최근 12개월 피지컬 순매출 기준 TOP30
  SELECT we_art_id, RANK() OVER (ORDER BY net DESC) AS rk
  FROM (
    SELECT a.we_art_id, b.we_art_name, SUM(net_pay_krw) AS net
    FROM weverse-prod-analytics.we_mart.stats_we_t_kpi_metric a

    WHERE date_type = 'M' AND service_code = 'TOTAL'

      AND extra_type = 'PRODUCT_TYPE' AND ctry_code = 'TOTAL'
      AND DATE_TRUNC(part_date, MONTH) >= DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -12 MONTH)
      AND DATE_TRUNC(part_date, MONTH) <= DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -1 MONTH)
      AND extra_key NOT IN ('DIGITAL_MEMBERSHIP', 'MEMBERSHIP', 'WDM')  -- 피지컬만
    GROUP BY 1, 2
    ORDER BY 3 DESC
    LIMIT 30
  )
)

SELECT *
FROM (
  -- 1. Digital / Physical 매출
  SELECT

  FROM weverse-prod-analytics.we_mart.stats_we_t_kpi_metric a
  LEFT JOIN (SELECT we_art_id, we_art_name FROM weverse-prod-analytics.we_mart.we_artist) b ON a.we_art_id = b.we_art_id
  INNER JOIN rk c ON a.we_art_id = c.we_art_id
  WHERE date_type = 'M' AND service_code = 'TOTAL'
    AND a.we_art_id <> -9999 AND extra_type = 'PRODUCT_TYPE' AND ctry_code = 'TOTAL'
    AND part_date >= '2024-01-01' AND part_date < DATE_TRUNC(CURRENT_DATE(), MONTH)
  GROUP BY 1, 2, 3, 4

  -- 2. Visitor (MAU/AU)
  SELECT

  FROM weverse-prod-analytics.we_mart.stats_we_t_kpi a

  WHERE a.part_date >= '2024-01-01' AND a.part_date < DATE_TRUNC(CURRENT_DATE(), MONTH)

  GROUP BY 1, 2, 3, 4, 5

  -- 3. Engage (참여율)
  SELECT
    key_date AS part_month, '2_engage' AS cat,
    b.we_art_name, c.rk,
    SUM(engaged_usr_m) / SUM(cnt_usr_m) AS value
  FROM weverse-prod-analytics.we_mart.stats_wv_m_comm_engage_usr a
  INNER JOIN rk c ON a.we_art_id = c.we_art_id
  LEFT JOIN (SELECT we_art_id, we_art_name FROM weverse-prod-analytics.we_mart.we_artist) b ON a.we_art_id = b.we_art_id
  WHERE key_date >= '2024-01-01' AND key_date < DATE_TRUNC(CURRENT_DATE(), MONTH)
    AND a.we_art_id <> -9999
  GROUP BY 1, 2, 3, 4
)`

    {
      id:'ref-q9',
      num:'실무9',
      title:'상품별 잠정실적 (카테고리별 마진율 적용)',
      desc:'상품을 6개 카테고리로 분류 후 마진율 적용한 조정 매출 계산. 전월/당월 비교',
      tables:['we_order'],
      funcs:['CASE WHEN (중첩)', 'SUM CASE WHEN', 'DATE_ADD', 'DATE_TRUNC', 'IFNULL', 'CURRENT_DATE'],
      hint:'카테고리별 마진율:\n- 앨범(ALBUM) / 굿즈(MERCH) → 44%\n- 콘텐츠(VOD, LIVE_TICKET) → 55%\n- WDM / 디지털멤버십 → 100%\n- 멤버십(MEMBERSHIP) → 20%\n\n날짜 자동 계산:\n- month_2 = 직전 2개월 (자동)\n- month_1 = 직전 1개월 (자동)\n- mon = month_1 - month_2 (MoM 증감)\n\n⚠️ CASE WHEN이 중복으로 반복되는 구조예요. 리팩토링하면 CTE로 마진율을 한 번만 정의할 수 있어요.',
      hintType:'warn',
      code:`/* 상품별 잠정실적 - 카테고리별 마진율 적용 */
SELECT
  we_art_name,
  cat,
  product_type,
  goods_name,
  goods_lwr_cat_name,

  -- 조정 매출: 직전 2개월 (month_2)
  month_2 * CASE
    WHEN cat = '1_ALBUM'              THEN 0.44
    WHEN cat = '4_MERCH'              THEN 0.44
    WHEN cat = '3_CONTENTS'           THEN 0.55
    WHEN cat = '99_WDM'               THEN 1.00
    WHEN cat = '99_DIGITAL_MEMBERSHIP'THEN 1.00
    WHEN cat = '2_MEMBERSHIP'         THEN 0.20
    ELSE 1
  END AS month_2,

  -- 조정 매출: 직전 1개월 (month_1)
  month_1 * CASE
    WHEN cat = '1_ALBUM'              THEN 0.44
    WHEN cat = '4_MERCH'              THEN 0.44
    WHEN cat = '3_CONTENTS'           THEN 0.55
    WHEN cat = '99_WDM'               THEN 1.00
    WHEN cat = '99_DIGITAL_MEMBERSHIP'THEN 1.00
    WHEN cat = '2_MEMBERSHIP'         THEN 0.20
    ELSE 1
  END AS month_1,

  -- MoM 증감 (month_1 - month_2)
  (month_1 - month_2) * CASE
    WHEN cat = '1_ALBUM'              THEN 0.44
    WHEN cat = '4_MERCH'              THEN 0.44
    WHEN cat = '3_CONTENTS'           THEN 0.55
    WHEN cat = '99_WDM'               THEN 1.00
    WHEN cat = '99_DIGITAL_MEMBERSHIP'THEN 1.00
    WHEN cat = '2_MEMBERSHIP'         THEN 0.20
    ELSE 1
  END AS mon

FROM (
  SELECT
    we_art_name,
    CASE
      WHEN product_type = 'WDM'                          THEN '99_WDM'
      WHEN product_type = 'DIGITAL_MEMBERSHIP'           THEN '99_DIGITAL_MEMBERSHIP'
      WHEN product_type = 'MEMBERSHIP'                   THEN '2_MEMBERSHIP'
      WHEN product_type = 'ALBUM'                        THEN '1_ALBUM'
      WHEN product_type IN ('VOD','LIVE_TICKET')         THEN '3_CONTENTS'
      WHEN product_type IN ('DVD','POD','MD','CLOTHING','LIGHT_STICK','BOOK','MOD') THEN '4_MERCH'
      ELSE '99_ELSE'
    END AS cat,
    product_type,
    goods_name,
    goods_lwr_cat_name,

    -- 직전 2개월 순매출
    SUM(CASE
      WHEN part_date >= DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -2 MONTH)
       AND part_date <  DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -1 MONTH)
      THEN IFNULL(pay_amt_krw, 0) - IFNULL(cx_amt_krw, 0)
      ELSE 0
    END) AS month_2,

    -- 직전 1개월 순매출
    SUM(CASE
      WHEN part_date >= DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -1 MONTH)
       AND part_date <  DATE_TRUNC(CURRENT_DATE(), MONTH)
      THEN IFNULL(pay_amt_krw, 0) - IFNULL(cx_amt_krw, 0)
      ELSE 0
    END) AS month_1

  FROM weverse-prod-analytics.we_mart.we_order
  WHERE part_date >= DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -2 MONTH)
    AND part_date <  DATE_TRUNC(CURRENT_DATE(), MONTH)
  GROUP BY 1, 2, 3, 4, 5
)`

    {
      id:'ref-q10',
      num:'실무10',
      title:'리스닝파티 아티스트별 MoM 비교 (파티수/참여자/스트리밍)',
      desc:'전월·전전월 피벗 후 MoM 증감 계산. 당월 방문자수(wv_visit_cnt) LEFT JOIN',
      tables:['stats_wv_d_party', 'stats_we_m_artist_kpi'],
      funcs:['SUM CASE WHEN (피벗)', 'LEFT JOIN', 'DATE_TRUNC', 'INTERVAL', 'IN'],
      hint:'피벗 패턴 (PIVOT 없이 구현):\nSUM(CASE WHEN 월 = 전월 THEN 값 ELSE 0 END) AS mon_1\nSUM(CASE WHEN 월 = 전전월 THEN 값 ELSE 0 END) AS mon_2\n→ 한 행에 두 달치를 나란히 세워요\n\nMoM 계산: mon_1 - mon_2\n\n날짜 조건:\nDATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL N MONTH\n→ 항상 자동으로 직전 N개월을 가리켜요',
      hintType:'success',
      code:`/* 리스닝파티 아티스트별 MoM 비교 */
SELECT
  a.*,
  b.wv_visit_cnt,
  (party_cnt_mon_1 - party_cnt_mon_2)         AS mom_party_cnt,
  (usr_cc_w_mon_1 - usr_cc_w_mon_2)           AS mom_user_cnt,
  (streaming_cnt_mon_1 - streaming_cnt_mon_2) AS mom_streaming_cnt
FROM (
  SELECT
    we_art_name, we_art_id, party_type,

    -- 파티수 전전월 / 전월
    SUM(CASE WHEN DATE(key_month) = DATE(DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 2 MONTH)
             THEN party_cnt ELSE 0 END) AS party_cnt_mon_2,
    SUM(CASE WHEN DATE(key_month) = DATE(DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 1 MONTH)
             THEN party_cnt ELSE 0 END) AS party_cnt_mon_1,

    -- 참여자수 전전월 / 전월
    SUM(CASE WHEN DATE(key_month) = DATE(DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 2 MONTH)
             THEN usr_tt_m ELSE 0 END) AS usr_cc_w_mon_2,
    SUM(CASE WHEN DATE(key_month) = DATE(DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 1 MONTH)
             THEN usr_tt_m ELSE 0 END) AS usr_cc_w_mon_1,

    -- 스트리밍수 전전월 / 전월
    SUM(CASE WHEN DATE(key_month) = DATE(DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 2 MONTH)
             THEN prod_streaming_cnt ELSE 0 END) AS streaming_cnt_mon_2,
    SUM(CASE WHEN DATE(key_month) = DATE(DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 1 MONTH)
             THEN prod_streaming_cnt ELSE 0 END) AS streaming_cnt_mon_1

  FROM weverse-prod-analytics.we_mart.stats_wv_d_party
  WHERE host_streaming_service = 'TOTAL'
    AND DATE(key_month) IN (
      DATE(DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 2 MONTH),
      DATE(DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 1 MONTH)
    )
  GROUP BY 1, 2, 3
  ORDER BY 1 DESC
) a
LEFT JOIN (
  -- 전월 방문자수 조인
  SELECT we_art_id, wv_visit_cnt
  FROM weverse-prod-analytics.we_mart.stats_we_m_artist_kpi
  WHERE part_month = DATE(DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 1 MONTH)
  GROUP BY 1, 2
) b ON a.we_art_id = b.we_art_id`

      tables:['stats_wv_t_dm_subscr', 'stats_wv_t_dfc_subscr', 'stats_ws_d_fc_join', 'we_country'],
      funcs:['UNION ALL', 'SUM CASE WHEN (피벗)', 'LAST_DAY', 'DATE_SUB', 'LEFT JOIN', 'IFNULL'],
      hint:'구독 테이블 3종 정리:\n① stats_wv_t_dm_subscr → WDM (위버스 디지털 멤버십)\n② stats_wv_t_dfc_subscr → Digital Membership (디지털 팬클럽)\n③ stats_ws_d_fc_join → FC (위버스샵 팬클럽)\n\n날짜 조건: LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL N MONTH))\n→ 전월/전전월 말일을 자동으로 가리켜요\n\nFC는 TOTAL + 아티스트별 두 번 UNION해서 합계와 상세를 모두 포함해요',
      hintType:'success',
      code:`/* 월별 구독수 MoM 비교 - WDM / 디지털멤버십 / FC */
SELECT
  a.*,
  month_1 - month_2 AS difference_mon1_mon2,
  b.ctry_name
FROM (
  -- 1. WDM 구독수
  SELECT
    'WDM' AS cat, we_art_name, ctry_code,
    SUM(CASE WHEN key_date = LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 2 MONTH))
             THEN CNT_SUBSCR ELSE 0 END) AS month_2,

             THEN CNT_SUBSCR ELSE 0 END) AS month_1
  FROM weverse-prod-analytics.we_mart.stats_wv_t_dm_subscr
  WHERE key_date IN (
      LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)),
      LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 2 MONTH)))
    AND dm_name = 'TOTAL' AND m_new_today = 'TOTAL' AND m_open_new = 'TOTAL'
    AND date_type = 'D' AND subscr_type = 'TOTAL' AND subscr_type_dtl = 'TOTAL'
    AND IFNULL(ctry_code, '') <> 'TOTAL'
  GROUP BY 1, 2, 3

  UNION ALL

  -- 2. Digital Membership 구독수
  SELECT

    SUM(CASE WHEN key_date = LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 2 MONTH))
             THEN CNT_SUBSCR ELSE 0 END) AS month_2,

    AND IFNULL(ctry_code, '') <> 'TOTAL' AND renewal_count = 'TOTAL'
  GROUP BY 1, 2, 3

  -- 3. FC 전체 합계 (TOTAL)

    SUM(CASE WHEN part_date = LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 2 MONTH))
             THEN new_nor_cnt + renew_nor_cnt + change_nor_cnt + expire_nor_cnt + etc_nor_cnt

  FROM weverse-prod-analytics.we_mart.stats_ws_d_fc_join

  GROUP BY 1, 2, 3

  -- 4. FC 아티스트별
  SELECT
    'FC' AS cat, we_art_name, ctry_code,
    SUM(CASE WHEN part_date = LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 2 MONTH))
             THEN new_nor_cnt + renew_nor_cnt + change_nor_cnt + expire_nor_cnt + etc_nor_cnt
             ELSE 0 END) AS month_2,
    SUM(CASE WHEN part_date = LAST_DAY(DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH))
             THEN new_nor_cnt + renew_nor_cnt + change_nor_cnt + expire_nor_cnt + etc_nor_cnt

  FROM weverse-prod-analytics.we_mart.stats_ws_d_fc_join

      tables:['stats_we_t_kpi', 'stats_wv_d_comm_join', 'we_artist'],

      hint:'지표별 테이블:\n① MAU(전체): stats_we_t_kpi · metric_key = \'AU\' · we_art_id = -9999\n② NRU(전체): stats_we_t_kpi · metric_key = \'NRU\' · we_art_id = -9999\n③ First커뮤니티: stats_wv_d_comm_join · first_comm_nru\n④ MAU(아티스트별): stats_we_t_kpi · service_code = \'WV\' · we_art_id <> -9999\n\n날짜 조건: DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL N MONTH\n→ 자동으로 전월/전전월 시작일을 계산해요',
      hintType:'success',
      code:`/* 월별 트래픽 지표 MoM 비교 */
SELECT cat AS metric, we_art_name, month_2, month_1, (month_1 - month_2) AS mom

             THEN metric_val ELSE 0 END) AS month_2,

             THEN metric_val ELSE 0 END) AS month_1
  FROM weverse-prod-analytics.we_mart.stats_we_t_kpi
  WHERE DATE_TRUNC(DATE(part_date), MONTH) IN (

      DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 2 MONTH)
    AND date_type = 'M' AND ctry_code = 'TOTAL' AND we_art_id = -9999
    AND extra_type = 'TOTAL' AND service_code = 'TOTAL' AND metric_key = 'NRU'
  GROUP BY 1, 2

  UNION ALL

  -- 3. First 커뮤니티 가입 (아티스트별)
  SELECT 'First' AS cat, we_art_name,
    SUM(CASE WHEN part_date >= DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -2 MONTH)
              AND part_date <  DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -1 MONTH)
             THEN first_comm_nru ELSE 0 END) AS month_2,
    SUM(CASE WHEN part_date >= DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -1 MONTH)
              AND part_date <  DATE_TRUNC(CURRENT_DATE(), MONTH)
             THEN first_comm_nru ELSE 0 END) AS month_1
  FROM weverse-prod-analytics.we_mart.stats_wv_d_comm_join
  WHERE part_date >= DATE_ADD(DATE_TRUNC(CURRENT_DATE(), MONTH), INTERVAL -2 MONTH)
    AND part_date <  DATE_TRUNC(CURRENT_DATE(), MONTH)
  GROUP BY 1, 2

  UNION ALL

  -- 4. MAU 아티스트별
  SELECT 'MAU' AS cat, b.we_art_name,
    SUM(CASE WHEN DATE_TRUNC(DATE(part_date), MONTH) = DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 2 MONTH
             THEN metric_val ELSE 0 END) AS month_2,
    SUM(CASE WHEN DATE_TRUNC(DATE(part_date), MONTH) = DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 1 MONTH
             THEN metric_val ELSE 0 END) AS month_1
  FROM weverse-prod-analytics.we_mart.stats_we_t_kpi a
  LEFT JOIN weverse-prod-analytics.we_mart.we_artist b ON a.we_art_id = b.we_art_id
  WHERE DATE_TRUNC(DATE(part_date), MONTH) IN (
      DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 1 MONTH,
      DATE_TRUNC(CURRENT_DATE(), MONTH) - INTERVAL 2 MONTH)
    AND date_type = 'M' AND ctry_code = 'TOTAL' AND a.we_art_id <> -9999
    AND extra_type = 'TOTAL' AND service_code = 'WV' AND metric_key = 'AU'
  GROUP BY 1, 2
)`
    },
    {
      id:'ref-q13',
      num:'실무13',
      title:'Superset Key Metric 구성 쿼리 (주간 누적 YoY)',
      desc:'5개 소스를 UNION ALL로 합쳐 주간 누적값 + 전년 동기 비교(plot_date) 계산. Superset 대시보드 데이터소스',
      tables:['stats_we_t_kpi', 'stats_we_d_visit', 'we_order', 'stats_we_t_cohort_retention', 'we_visit_weekly', 'stats_wv_d_comm_cross_join_agg'],
      funcs:['SUM OVER (누적합)', 'UNION ALL', 'ISOYEAR/ISOWEEK', 'EXTRACT', 'DATE_TRUNC ISOWEEK', 'SAFE_DIVIDE', 'PERCENTILE/서브쿼리'],
      hint:'쿼리 구조 (3단계 중첩):\n① 최내부: 5개 소스 UNION ALL → 주간 지표 raw\n② 중간: year_group + plot_date 추가 (YoY 비교용 날짜 변환)\n③ 최외부: SUM OVER(PARTITION BY year_group, metric_key) → 주간 누적합\n\n포함된 지표 (metric_key):\n- NET_PAY_KRW: 순매출 · PAY_UU_RATE: 결제율 · ARPPU_KRW\n- AU: MAU · NRU: 신규 · DFC_CNT / FC_CNT / DM_CNT: 구독\n- PARTY_STREAM: 리스닝파티 · NET_PAY_KRW_CONT: 조정매출\n- D1/D7/D30 ret: 리텐션 · L5: 고관여유저 · cross_comm: 겸덕\n- Best Month / Last Month / This Month: 방문자 누적 비교\n\nplot_date 로직:\n→ 올해 날짜를 전년도 동일 월/일로 변환해서 YoY 차트를 하나의 축에 겹쳐 그려요\n\nISO 주차(ISOWEEK) 주의:\n→ 연초/연말 경계에서 일반 WEEK과 다를 수 있어요',
      hintType:'success',
      code:`/* Superset Key Metric 구성 쿼리 - 주간 누적 YoY */

-- 최외부: 주간 누적합(SUM OVER) 계산
SELECT
  plot_date,
  year_group,
  week_day_num,
  DATE_TRUNC(key_date, WEEK(MONDAY)) AS week_starting_monday,
  key_date,
  metric_key,
  value,
  SUM(value) OVER (
    PARTITION BY year_group, metric_key
    ORDER BY week_day_num
    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
  ) AS value_nu  -- 누적값
FROM (

  -- 중간: YoY 비교용 plot_date + year_group 추가
  SELECT
    DATE(
      EXTRACT(YEAR FROM CURRENT_DATE()) - 1,
      EXTRACT(MONTH FROM CAST(key_date AS DATE)),
      EXTRACT(DAY FROM CAST(key_date AS DATE))
    ) AS plot_date,  -- 전년도 동일 날짜로 변환 (YoY 차트용)
    CAST(EXTRACT(ISOYEAR FROM key_date) AS STRING) AS year_group,
    week_day_num,
    key_date,
    metric_key,
    SUM(CAST(value AS FLOAT64)) AS value
  FROM (

    -- 1. KPI 지표 (주간): 매출/AU/NRU/구독/리스닝파티 등
    SELECT
      CAST(key_date AS DATE) AS key_date,
      EXTRACT(ISOWEEK FROM key_date) AS week_day_num,
      metric_key,
      CAST(metric_val AS FLOAT64) AS value
    FROM weverse-prod-analytics.we_mart.stats_we_t_kpi
    WHERE key_date >= DATE_TRUNC(DATE(EXTRACT(ISOYEAR FROM CURRENT_DATE()) - 2, 1, 4), ISOWEEK)
      AND service_code = 'TOTAL' AND we_art_id = -9999
      AND extra_type = 'TOTAL' AND extra_key = 'TOTAL' AND ctry_code = 'TOTAL'
      AND metric_key IN (
        'NET_PAY_KRW', 'PAY_UU_RATE', 'ARPPU_KRW', 'AU', 'NRU',
        'DFC_CNT', 'FC_CNT', 'DM_CNT', 'PARTY_STREAM'
      )
      AND date_type = 'W'
    GROUP BY 1, 2, 3, 4

    UNION ALL

    -- 2. 방문자 누적 비교 (Best Month / Last Month / This Month)
    SELECT key_date, week_day_num, metric_key,
      SUM(daily_raw_value) OVER (PARTITION BY metric_key ORDER BY key_date) AS value
    FROM (
      SELECT
        CAST(key_date AS DATE) AS key_date,
        EXTRACT(DAY FROM key_date) AS week_day_num,
        CASE
          WHEN DATE_TRUNC(key_date, MONTH) = (
            SELECT DATE_TRUNC(key_date, MONTH)
            FROM weverse-prod-analytics.we_mart.stats_we_d_visit
            WHERE we_art_id = -9999 AND service_type = 'TOTAL'
              AND platform = 'TOTAL' AND OS = 'TOTAL' AND ctry_code = 'TOTAL' AND lang_code = 'TOTAL'
              AND key_date < DATE_TRUNC(CURRENT_DATE(), MONTH)
            GROUP BY 1 ORDER BY SUM(cnt_user_m) DESC LIMIT 1
          ) THEN 'Best Month'
          WHEN DATE_TRUNC(key_date, MONTH) = DATE_TRUNC(CURRENT_DATE(), MONTH) THEN 'This Month'
          WHEN DATE_TRUNC(key_date, MONTH) = DATE_TRUNC(DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH), MONTH) THEN 'Last Month'
        END AS metric_key,
        SUM(cnt_user_m) AS daily_raw_value
      FROM weverse-prod-analytics.we_mart.stats_we_d_visit
      WHERE we_art_id = -9999 AND service_type = 'TOTAL'
        AND platform = 'TOTAL' AND OS = 'TOTAL' AND ctry_code = 'TOTAL' AND lang_code = 'TOTAL'
        AND (
          DATE_TRUNC(key_date, MONTH) = (
            SELECT DATE_TRUNC(key_date, MONTH)
            FROM weverse-prod-analytics.we_mart.stats_we_d_visit
            WHERE we_art_id = -9999 AND key_date < DATE_TRUNC(CURRENT_DATE(), MONTH)
              AND service_type = 'TOTAL' AND platform = 'TOTAL' AND OS = 'TOTAL'
              AND ctry_code = 'TOTAL' AND lang_code = 'TOTAL'
            GROUP BY 1 ORDER BY SUM(cnt_user_m) DESC LIMIT 1
          )
          OR DATE_TRUNC(key_date, MONTH) >= DATE_TRUNC(DATE_SUB(CURRENT_DATE(), INTERVAL 2 MONTH), MONTH)
        )
      GROUP BY 1, 2, 3
    )
    WHERE metric_key IS NOT NULL

    UNION ALL

    -- 3. 조정 매출 NET_PAY_KRW_CONT (마진율 적용)
    SELECT
      DATE_TRUNC(CAST(part_date AS DATE), ISOWEEK) AS key_date,
      EXTRACT(ISOWEEK FROM part_date) AS week_day_num,
      'NET_PAY_KRW_CONT' AS metric_key,
      CAST(SUM(
        (IFNULL(pay_amt_krw, 0) - IFNULL(cx_amt_krw, 0)) * CASE
          WHEN product_type = 'ALBUM' THEN 0.44
          WHEN product_type IN ('DVD','POD','MD','CLOTHING','LIGHT_STICK','BOOK','MOD') THEN 0.44
          WHEN product_type IN ('VOD', 'LIVE_TICKET') THEN 0.55
          WHEN product_type = 'MEMBERSHIP' THEN 0.20
          ELSE 1.00
        END
      ) AS FLOAT64) AS value
    FROM weverse-prod-analytics.we_mart.we_order
    WHERE part_date >= DATE_TRUNC(DATE(EXTRACT(ISOYEAR FROM CURRENT_DATE()) - 2, 1, 4), ISOWEEK)
    GROUP BY 1, 2, 3

    UNION ALL

    -- 4. 리텐션 (D1 / D7 / D30)
    SELECT
      CAST(cohort_date AS DATE) AS key_date,
      EXTRACT(ISOWEEK FROM cohort_date) AS week_day_num,
      CASE WHEN dur = 1 THEN 'D1 ret' WHEN dur = 7 THEN 'D7 ret' WHEN dur = 30 THEN 'D30 ret' END AS metric_key,
      SAFE_DIVIDE(cnt_cohort_vst_user, cnt_cohort_base_user) AS value
    FROM weverse-prod-analytics.we_mart.stats_we_t_cohort_retention
    WHERE vst_date >= DATE_TRUNC(DATE(EXTRACT(ISOYEAR FROM CURRENT_DATE()) - 1, 1, 4), ISOWEEK)
      AND date_type = 'D' AND dur IN (1, 7, 30, 60, 120)
      AND service_code = 'WV' AND we_art_id = -9999 AND ctry_code = 'TOTAL'
      AND cohort_type = 'SERVICE_JOIN'
    GROUP BY 1, 2, 3, 4

    UNION ALL

    -- 5. 고관여 유저 L5 (주 5일 이상 방문)
    SELECT
      part_week AS key_date,
      EXTRACT(ISOWEEK FROM part_week) AS week_day_num,
      'L5' AS metric_key,
      SAFE_DIVIDE(
        COUNT(DISTINCT IF(this_w_days >= 5, we_member_id, NULL)),
        COUNT(DISTINCT we_member_id)
      ) AS value
    FROM weverse-prod-analytics.we_mart.we_visit_weekly
    WHERE part_week >= DATE_TRUNC(DATE(EXTRACT(ISOYEAR FROM CURRENT_DATE()) - 1, 1, 4), ISOWEEK)
    GROUP BY 1, 2

    UNION ALL

    -- 6. 겸덕 비율 (2개 이상 커뮤니티 가입)
    SELECT
      DATE_TRUNC(CAST(part_date AS DATE), ISOWEEK) AS key_date,
      EXTRACT(ISOWEEK FROM part_date) AS week_day_num,
      'cross_comm' AS metric_key,
      SUM(CASE WHEN join_comm_cnt >= 2 THEN user_cnt END) / SUM(user_cnt) AS value
    FROM weverse-prod-analytics.we_mart.stats_wv_d_comm_cross_join_agg
    WHERE part_date >= DATE_TRUNC(DATE(EXTRACT(ISOYEAR FROM CURRENT_DATE()) - 1, 1, 4), ISOWEEK)
      AND EXTRACT(DAYOFWEEK FROM part_date) = 1  -- 일요일 (주 마지막)
      AND we_art_id = -9999
    GROUP BY 1, 2, 3

    ORDER BY key_date DESC, metric_key ASC
  )
  GROUP BY 1, 2, 3, 4, 5
)`

    {
      id:'ref-q14',
      num:'실무14',
      title:'주간 리스닝파티 WoW 비교 (파티수/참여자/스트리밍)',
      desc:'전주·전전주 피벗 후 WoW 증감 계산. 전주 방문자수(wv_visit_cnt) LEFT JOIN',
      tables:['stats_wv_d_party', 'stats_we_w_artist_kpi'],
      funcs:['SUM CASE WHEN (피벗)', 'LEFT JOIN', 'WEEK(MONDAY)', 'INTERVAL DAY'],
      hint:'월간 버전(실무10)과의 차이:\n- 기준: MONTH → WEEK(MONDAY) (월요일 기준 주차)\n- 날짜 단위: INTERVAL 1/2 MONTH → INTERVAL 7/14 DAY\n- 테이블: stats_we_m_artist_kpi → stats_we_w_artist_kpi\n- 지표: usr_tt_m → usr_tt_w\n\n주차 기준 날짜 계산:\n- 전주 시작: DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY\n- 전전주 시작: DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 14 DAY',
      hintType:'info',
      code:`/* 주간 리스닝파티 WoW 비교 */
SELECT
  a.*,
  wv_visit_cnt,
  (party_cnt_week_1 - party_cnt_week_2)       AS wow_party_cnt,
  (usr_cc_w_week_1 - usr_cc_w_week_2)         AS wow_user_cnt,
  (streaming_cnt_week_1 - streaming_cnt_week_2) AS wow_streaming_cnt
FROM (
  SELECT
    we_art_name, we_art_id, party_type,

    -- 파티수 전전주 / 전주
    SUM(CASE WHEN DATE(key_week) = DATE(DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 14 DAY)
             THEN party_cnt ELSE 0 END) AS party_cnt_week_2,
    SUM(CASE WHEN DATE(key_week) = DATE(DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY)
             THEN party_cnt ELSE 0 END) AS party_cnt_week_1,

    -- 참여자수 전전주 / 전주
    SUM(CASE WHEN DATE(key_week) = DATE(DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 14 DAY)
             THEN usr_tt_w ELSE 0 END) AS usr_cc_w_week_2,
    SUM(CASE WHEN DATE(key_week) = DATE(DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY)
             THEN usr_tt_w ELSE 0 END) AS usr_cc_w_week_1,

    -- 스트리밍수 전전주 / 전주
    SUM(CASE WHEN DATE(key_week) = DATE(DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 14 DAY)
             THEN prod_streaming_cnt ELSE 0 END) AS streaming_cnt_week_2,
    SUM(CASE WHEN DATE(key_week) = DATE(DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY)
             THEN prod_streaming_cnt ELSE 0 END) AS streaming_cnt_week_1

  FROM weverse-prod-analytics.we_mart.stats_wv_d_party
  WHERE host_streaming_service = 'TOTAL'
    AND DATE(key_week) IN (
      DATE(DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 14 DAY),
      DATE(DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY)
    )
  GROUP BY 1, 2, 3
  ORDER BY 1 DESC
) a
LEFT JOIN (
  -- 전주 방문자수 조인
  SELECT we_art_id, wv_visit_cnt
  FROM weverse-prod-analytics.we_mart.stats_we_w_artist_kpi
  WHERE part_week = DATE(DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY)
  GROUP BY 1, 2
) b ON a.we_art_id = b.we_art_id`

    {
      id:'ref-q15',
      num:'실무15',
      title:'주간 구독지표 WoW 비교 (WDM / 디지털멤버십 / FC)',
      desc:'3개 구독 상품을 UNION ALL로 합치고 전주·전전주 피벗 후 WoW 증감 계산. 국가별 포함',
      tables:['stats_wv_t_dm_subscr', 'stats_wv_t_dfc_subscr', 'stats_ws_d_fc_join', 'we_country'],
      funcs:['UNION ALL', 'SUM CASE WHEN (피벗)', 'WEEK(MONDAY)', 'INTERVAL DAY', 'LEFT JOIN', 'IFNULL'],
      hint:'월간 구독 버전(실무11)과의 차이:\n- 기준: LAST_DAY(월말) → WEEK(MONDAY) - INTERVAL 1/8 DAY (주말 일요일)\n- 날짜: 전주 마지막날 = WEEK(MONDAY) - INTERVAL 1 DAY (일요일)\n- 전전주 마지막날 = WEEK(MONDAY) - INTERVAL 8 DAY\n\n⚠️ 원본 쿼리의 "Degital Membership" 오타는 "Digital Membership"으로 수정됐어요',
      hintType:'info',
      code:`/* 주간 구독지표 WoW 비교 */
SELECT

  -- 3. FC 아티스트별
  SELECT 'FC' AS cat, we_art_name, ctry_code,

             THEN new_nor_cnt + renew_nor_cnt + change_nor_cnt + expire_nor_cnt + etc_nor_cnt
             ELSE 0 END) AS week_2,
    SUM(CASE WHEN part_date = DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 1 DAY
             THEN new_nor_cnt + renew_nor_cnt + change_nor_cnt + expire_nor_cnt + etc_nor_cnt
             ELSE 0 END) AS week_1
  FROM weverse-prod-analytics.we_mart.stats_ws_d_fc_join

             THEN new_nor_cnt + renew_nor_cnt + change_nor_cnt + expire_nor_cnt + etc_nor_cnt

             ELSE 0 END) AS week_1
  FROM weverse-prod-analytics.we_mart.stats_ws_d_fc_join

    {
      id:'ref-q16',
      num:'실무16',
      title:'주간 트래픽 지표 WoW 비교 (WAU / NRU / First / 아티스트별 WAU·RU)',
      desc:'전체 WAU·NRU·첫커뮤니티·아티스트별 WAU·RU 5개 지표를 UNION ALL로 합쳐 WoW 비교',
      tables:['stats_we_t_kpi', 'stats_wv_d_comm_join', 'we_artist'],
      funcs:['UNION ALL', 'SUM CASE WHEN (피벗)', 'WEEK(MONDAY)', 'DATE_ADD', 'LEFT JOIN'],
      hint:'월간 트래픽(실무12)과의 차이:\n- 기준: MONTH → WEEK(MONDAY)\n- WAU: date_type = \'W\' · metric_key = \'AU\'\n- NRU: date_type = \'W\' · metric_key = \'NRU\'\n- 아티스트별 RU: metric_key = \'COMM_RU\'\n- First 커뮤니티: 주간 범위 DATE_ADD +(-7~-14 DAY)\n\n전전주: WEEK(MONDAY) - INTERVAL 14 DAY\n전주: WEEK(MONDAY) - INTERVAL 7 DAY',
      hintType:'info',
      code:`/* 주간 트래픽 지표 WoW 비교 */
SELECT cat AS metric, we_art_name, week_2, week_1, (week_1 - week_2) AS wow
FROM (
  -- 1. WAU 전체
  SELECT 'WAU' AS cat, 'TOTAL' AS we_art_name,
    SUM(CASE WHEN part_date = DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 14 DAY
             THEN metric_val ELSE 0 END) AS week_2,
    SUM(CASE WHEN part_date = DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY
             THEN metric_val ELSE 0 END) AS week_1
  FROM weverse-prod-analytics.we_mart.stats_we_t_kpi
  WHERE part_date IN (
      DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY,
      DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 14 DAY)
    AND date_type = 'W' AND ctry_code = 'TOTAL' AND we_art_id = -9999
    AND extra_type = 'TOTAL' AND service_code = 'TOTAL' AND metric_key = 'AU'
  GROUP BY 1, 2

  UNION ALL

  -- 2. NRU 전체
  SELECT 'NRU' AS cat, 'TOTAL' AS we_art_name,

  SELECT 'RU' AS cat, b.we_art_name,
    SUM(CASE WHEN part_date = DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 14 DAY
             THEN metric_val ELSE 0 END) AS week_2,
    SUM(CASE WHEN part_date = DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY
             THEN metric_val ELSE 0 END) AS week_1
  FROM weverse-prod-analytics.we_mart.stats_we_t_kpi a
  LEFT JOIN weverse-prod-analytics.we_mart.we_artist b ON a.we_art_id = b.we_art_id
  WHERE part_date IN (
      DATE_TRUNC(CURRENT_DATE(), WEEK(MONDAY)) - INTERVAL 7 DAY,

    AND date_type = 'W' AND ctry_code = 'TOTAL' AND a.we_art_id <> -9999
    AND extra_type = 'TOTAL' AND service_code = 'WV' AND metric_key = 'COMM_RU'
  GROUP BY 1, 2
)`

// ===== RENDER =====
function highlight(code) {
  return code
    .replace(/--.*$/gm, m => `<span class="cm">${m}</span>`)
    .replace(/\/\*[\s\S]*?\*\//g, m => `<span class="cm">${m}</span>`)
    .replace(/\b(SELECT|FROM|WHERE|GROUP BY|ORDER BY|HAVING|LIMIT|JOIN|LEFT JOIN|INNER JOIN|UNION ALL|WITH|AS|ON|AND|OR|NOT|IN|BETWEEN|LIKE|DISTINCT|CASE|WHEN|THEN|ELSE|END|IF|IFNULL|SAFE_DIVIDE|SUM|COUNT|AVG|MAX|MIN|DATE_TRUNC|EXTRACT|DATE_ADD|DATE_SUB|DATE_DIFF|FORMAT|PARSE_DATE|FORMAT_DATE|PERCENTILE_CONT|CURRENT_DATE|CURRENT_TIMESTAMP|TIMESTAMP_ADD|LAST_DAY|UPPER|DATE|INTERVAL|PARTITION BY|OVER|NULL|IS NULL|IS NOT NULL|NOT LIKE)\b/gi,
      m => `<span class="kw">${m}</span>`)
    .replace(/'[^']*'/g, m => `<span class="str">${m}</span>`)
    .replace(/\b(\d+)\b/g, m => `<span class="num">${m}</span>`)
    .replace(/`[^`]+`/g, m => `<span class="tbl">${m}</span>`)
    .replace(/weverse-prod-analytics\.[a-z_]+\.[a-z_]+/g, m => `<span class="tbl">${m}</span>`);
}

function makeCard(q) {
  const tags = q.tables.map(t=>`<span class="card-tag table">${t}</span>`).join('')
    + q.funcs.map(f=>`<span class="card-tag func">${f}</span>`).join('');
  const hintClass = q.hint ? (q.hintType==='warn'?'warn':q.hintType==='success'?'success':'') : '';
  const hintHtml = q.hint ? `
    <div class="card-section">
      <div class="section-label">💡 포인트</div>
      <div class="hint-box ${hintClass}" style="white-space:pre-line">${q.hint.replace(/\n/g,'<br>')}</div>
    </div>` : '';

  return `<div class="query-card" id="${q.id}">
  <div class="card-header" onclick="toggleCard('${q.id}')">
    <div class="card-num">${q.num}</div>
    <div class="card-title-wrap">
      <div class="card-title">${q.title}</div>
      <div class="card-desc">${q.desc}</div>
      <div class="card-tags">${tags}</div>
    </div>
    <div class="card-toggle" id="toggle-${q.id}">▼</div>
  </div>
  <div class="card-body" id="body-${q.id}">
    ${hintHtml}
    <div class="card-section">
      <div class="section-label">📋 쿼리</div>
      <div class="code-wrap">
        <pre><code>${highlight(q.code)}</code></pre>
        <button class="copy-btn" onclick="copyCode('${q.id}', this)">복사</button>
      </div>
    </div>
  </div>
</div>`;
}

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  const tog = document.getElementById('toggle-'+id);
  body.classList.toggle('open');
  tog.classList.toggle('open');
}

function copyCode(id, btn) {
  const el = document.querySelector(`#${id} pre code`);
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✓ 복사됨'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='복사'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderGlossary() {
  const terms = [
    {term:'SELECT', def:'조회할 컬럼 지정. * 는 전체', ex:'SELECT key_date, we_art_name'},
    {term:'FROM', def:'데이터를 가져올 테이블 지정', ex:'FROM we_mart.we_order'},
    {term:'WHERE', def:'행(Row) 단위 필터링', ex:'WHERE part_date = \'2026-01-01\''},
    {term:'GROUP BY', def:'집계 기준 컬럼 지정 (SUM/COUNT 등과 함께)', ex:'GROUP BY key_date, product_type'},
    {term:'ORDER BY', def:'결과 정렬 (ASC=오름차순, DESC=내림차순)', ex:'ORDER BY key_date DESC'},
    {term:'HAVING', def:'GROUP BY 후 집계 결과 필터링', ex:'HAVING SUM(pay_amt_krw) >= 1000000'},
    {term:'LIMIT', def:'결과 행 수 제한', ex:'LIMIT 10'},
    {term:'SUM()', def:'합계', ex:'SUM(pay_amt_krw)'},
    {term:'COUNT(DISTINCT)', def:'중복 제거 후 개수', ex:'COUNT(DISTINCT we_member_id)'},
    {term:'AVG()', def:'평균', ex:'AVG(sess_dur)'},
    {term:'IFNULL(a,b)', def:'a가 NULL이면 b로 대체', ex:'IFNULL(cx_amt_krw, 0)'},
    {term:'SAFE_DIVIDE(a,b)', def:'나누기 (0 나누기 에러 방지)', ex:'SAFE_DIVIDE(pu_we, mau_we)'},
    {term:'DATE_TRUNC()', def:'날짜를 특정 단위로 절삭', ex:'DATE_TRUNC(key_date, MONTH)'},
    {term:'EXTRACT()', def:'날짜에서 특정 부분 추출', ex:'EXTRACT(YEAR FROM key_date)'},
    {term:'DATE_ADD/SUB', def:'날짜 더하기/빼기', ex:'DATE_ADD(date, INTERVAL 3 MONTH)'},
    {term:'DATE_DIFF()', def:'두 날짜의 차이 계산', ex:'DATE_DIFF(v.visit_date, s.signup_date, DAY)'},
    {term:'UPPER()', def:'문자열을 대문자로 변환', ex:'UPPER(goods_name)'},
    {term:'LIKE / NOT LIKE', def:'패턴 매칭 (% = 와일드카드)', ex:'UPPER(art_indi_name) NOT LIKE \'%OFFICIAL%\''},
    {term:'IN / NOT IN', def:'여러 값 일치/미일치 조건', ex:'product_type IN (\'WDM\', \'Membership\')'},
    {term:'CASE WHEN', def:'조건부 값 변환 (if-else)', ex:'CASE WHEN is_pay=1 THEN we_member_id END'},
    {term:'IF(cond,a,b)', def:'조건이 참이면 a, 거짓이면 b', ex:'IF(is_pay=1, \'paid\', \'free\')'},
    {term:'LEFT JOIN', def:'왼쪽 테이블 전체 + 오른쪽 매칭', ex:'LEFT JOIN we_artist b ON a.we_art_id = b.we_art_id'},
    {term:'INNER JOIN', def:'양쪽 모두 매칭되는 행만', ex:'INNER JOIN user_visits v ON s.we_member_id = v.we_member_id'},
    {term:'UNION ALL', def:'여러 쿼리 결과를 세로로 합치기', ex:'SELECT ... UNION ALL SELECT ...'},
    {term:'WITH (CTE)', def:'임시 테이블 정의 후 재사용', ex:'WITH temp AS (SELECT ...) SELECT * FROM temp'},
    {term:'OVER(PARTITION BY)', def:'윈도우 함수: 그룹별 계산', ex:'SUM(amt) OVER (PARTITION BY mon)'},
    {term:'PERCENTILE_CONT', def:'백분위수 계산 (0.5 = 중위값)', ex:'PERCENTILE_CONT(dur, 0.5) OVER (PARTITION BY mon)'},
    {term:'BETWEEN A AND B', def:'A 이상 B 이하 범위 (주의: B의 시작까지)', ex:'part_date BETWEEN \'2026-01-01\' AND \'2026-01-31\''},
  ];
  return `
  <div class="chapter-header">
    <div class="chapter-icon" style="background:rgba(167,139,250,.1)">📖</div>
    <div><h2>SQL 용어 사전</h2><p>자주 쓰는 함수와 개념 정리</p></div>
  </div>
  <div class="glossary-grid">
    ${terms.map(t=>`
    <div class="glossary-item">
      <div class="gterm">${t.term}</div>
      <div class="gdef">${t.def}</div>
      <div class="gex">${t.ex}</div>
    </div>`).join('')}
  </div>`;
}

function handleSearch(val) {
  const words = val.trim().toLowerCase().split(/\s+/).filter(w=>w);
  if(!words.length) { showPage(currentPage); return; }

  // Search across all chapters - match ANY word
  let primaryResults = [];
  let relatedResults = [];
  let primaryTables = [];
  let primaryFuncs = [];
  let matchScores = {};

  Object.values(QUERIES).forEach(qs=>{
    qs.forEach(query=>{
      let matchCount = 0;
      const titleLower = query.title.toLowerCase();
      const descLower = query.desc.toLowerCase();
      const codeLower = query.code.toLowerCase();

      // 각 검색어에 대해 점수 계산
      words.forEach(word=>{
        if(titleLower.includes(word)) matchCount += 3;  // 제목 일치 - 높은 가중치
        else if(descLower.includes(word)) matchCount += 2;  // 설명 일치
        else if(codeLower.includes(word)) matchCount += 1;  // 코드 일치
        else if(query.tables.some(t=>t.toLowerCase().includes(word))) matchCount += 1.5;
        else if(query.funcs.some(f=>f.toLowerCase().includes(word))) matchCount += 1.5;
      });

      if(matchCount > 0) {
        primaryResults.push(query);
        matchScores[query.id] = matchCount;
        primaryTables.push(...query.tables);
        primaryFuncs.push(...query.funcs);
      }
    });
  });

  // 점수 기준으로 정렬
  primaryResults.sort((a,b) => (matchScores[b.id] || 0) - (matchScores[a.id] || 0));

  // 연관된 쿼리 찾기 (같은 테이블이나 함수를 사용하되, 정확히 일치하지 않은 쿼리)
  if(primaryResults.length > 0) {
    Object.values(QUERIES).forEach(qs=>{
      qs.forEach(query=>{
        if(!primaryResults.includes(query)) {
          const hasSameTable = query.tables.some(t => primaryTables.includes(t));
          const hasSameFunc = query.funcs.some(f => primaryFuncs.includes(f));
          if(hasSameTable || hasSameFunc) {
            relatedResults.push(query);
          }
        }
      });
    });
  }

  document.getElementById('page-title').textContent = `검색: "${val}" (${words.length}개 단어)`;
  const totalCount = primaryResults.length + relatedResults.length;
  document.getElementById('page-badge').textContent = `${primaryResults.length}${relatedResults.length > 0 ? '+' + relatedResults.length : ''}개`;

  const content = document.getElementById('content');
  if(primaryResults.length === 0) {
    content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-muted)">
      <div style="font-size:48px;margin-bottom:16px">🔍</div>
      <div>"${val}"에 대한 결과가 없어요</div>
    </div>`;
    return;
  }

  let html = primaryResults.map(makeCard).join('');
  if(relatedResults.length > 0) {
    html += `
    <div style="margin-top:40px;padding-top:24px;border-top:1px solid var(--border);">
      <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:16px;letter-spacing:.5px;">
        📌 연관된 쿼리 (같은 테이블/함수)
      </div>
      ${relatedResults.slice(0,10).map(makeCard).join('')}
    </div>`;
  }
  content.innerHTML = html;
}

const KEYWORD_MAP = [
  {keys:['파티션','partition','part_date'], key:'partition_key'},
  {keys:['group by','그룹','집계'], key:'group_by'},
  {keys:['join','조인'], key:'join_diff'},
  {keys:['with','cte','임시'], key:'with_cte'},
  {keys:['순판매','net','환불'], key:'net_amt'},
  {keys:['date_trunc','날짜','절삭'], key:'date_trunc'},
];

function sendChat() {
  const input = document.getElementById('chat-input');
  const val = input.value.trim();
  if(!val) return;
  addMsg(val, true);
  input.value = '';

  const low = val.toLowerCase();
  let matched = null;
  for(const km of KEYWORD_MAP) {
    if(km.keys.some(k=>low.includes(k))) { matched = km.key; break; }
  }

  setTimeout(()=>{
    if(matched && QA[matched]) {
      addMsg(QA[matched].a, false);
    } else {
      // Search queries
      let found = [];
      Object.values(QUERIES).forEach(qs=>{
        qs.forEach(q=>{
          if(q.title.toLowerCase().includes(low) || q.desc.toLowerCase().includes(low) ||
             q.tables.some(t=>t.toLowerCase().includes(low))) found.push(q);
        });
      });
      if(found.length > 0) {
        let resp = `"${val}"와 관련된 쿼리를 찾았어요! 📋<br><br>`;
        found.slice(0,3).forEach(q=>{
          resp += `• <b>${q.title}</b> (${q.tables.join(', ')})<br>`;
        });
        resp += `<br>왼쪽 메뉴나 검색창에서 더 자세히 확인해보세요!`;
        addMsg(resp, false);
      } else {
        addMsg(`"${val}"에 대한 답변을 찾지 못했어요 😅<br><br>
아래 빠른 버튼들을 눌러서 자주 묻는 질문을 확인해보거나,<br>
검색창(왼쪽 상단)에서 직접 쿼리를 검색해보세요!`, false);
      }
    }
  }, 400);
}

showPage('home');
document.getElementById('page-badge').style.display = 'none';
</script>
